<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>Credits</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }

    #clip {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      height: 33.333vh;
      background: rgba(5, 15, 50, 0.82);
      overflow: hidden;
    }

    #wrapper {
      position: absolute;
      left: 0; right: 0;
      padding: 0 6%;
      will-change: transform;
    }

    .credits-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      padding-bottom: 40px;
    }

    .credit-section { margin-bottom: 28px; }

    .credit-titel {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #f5c518;
      margin-bottom: 5px;
    }

    .credit-navne {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 14px;
      color: #ffffff;
      line-height: 1.65;
    }
  </style>
</head>
<body>
  <div id="clip">
    <div id="wrapper">
      <div id="creditsGrid" class="credits-grid">
        <div></div>
        <div></div>
      </div>
    </div>
  </div>

  <script>
    const API = 'https://script.google.com/macros/s/AKfycbxRufEbQXaXP4JtAgEnUep-yW5RzCh_qsStXUTEO_402rthriL6yL6XFsRS_Qw_f5TN6A/exec';

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    async function load() {
      try {
        const data = await fetch(API + '?action=getCredits').then(r => r.json());

        const left  = (data.items || []).filter(i => i.side === 'V').sort((a, b) => a.orden - b.orden);
        const right = (data.items || []).filter(i => i.side === 'H').sort((a, b) => a.orden - b.orden);

        function renderCol(items) {
          return items.map(item => `
            <div class="credit-section">
              <div class="credit-titel">${esc(item.titel)}</div>
              <div class="credit-navne">${item.navne.split(',').map(n => esc(n.trim())).filter(Boolean).join('<br>')}</div>
            </div>
          `).join('');
        }

        const grid = document.getElementById('creditsGrid');
        grid.children[0].innerHTML = renderCol(left);
        grid.children[1].innerHTML = renderCol(right);

        const speed   = data.speed || 30;
        const clip    = document.getElementById('clip');
        const wrapper = document.getElementById('wrapper');

        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            const clipH    = clip.offsetHeight;
            const contentH = wrapper.offsetHeight;
            const startY   = clipH;
            const endY     = -contentH;
            const duration = speed * 1000;
            let startTime  = null;

            wrapper.style.transform = `translateY(${startY}px)`;

            function animate(ts) {
              if (!startTime) startTime = ts;
              const progress = Math.min((ts - startTime) / duration, 1);
              const y = startY + (endY - startY) * progress;
              wrapper.style.transform = `translateY(${y}px)`;
              if (progress < 1) {
                requestAnimationFrame(animate);
              } else {
                setTimeout(() => location.reload(), 3000);
              }
            }

            requestAnimationFrame(animate);
          });
        });

      } catch (err) {
        console.error('Credits fejl:', err);
      }
    }

    load();
  </script>
</body>
</html>
