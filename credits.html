<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>Credits</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }

    #clip {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      height: 33.333vh;
      background: linear-gradient(to top,
        rgba(0,0,75,0)    0%,
        rgba(0,0,75,0.05) 8%,
        rgba(0,0,75,0.15) 16%,
        rgba(0,0,75,0.3)  25%,
        rgba(0,0,75,0.5)  35%,
        rgba(0,0,75,0.7)  47%,
        rgba(0,0,75,0.88) 58%,
        rgb(0,0,75)       70%
      );
      overflow: hidden;
      transform: translateY(100%);
    }

    #wrapper {
      position: absolute;
      left: 0; right: 0;
      padding: 0 6%;
      will-change: transform;
    }

    .credits-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      padding-bottom: 40px;
    }

    .credit-section { margin-bottom: 28px; }

    .credit-titel {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgb(255, 210, 0);
      margin-bottom: 5px;
    }

    .credit-navn {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: rgb(255, 255, 255);
      line-height: 1.65;
      display: block;
    }

    #logoVideo {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      max-width: 80%;
      max-height: 80%;
    }
  </style>
</head>
<body>
  <div id="clip">
    <div id="wrapper">
      <div id="creditsGrid" class="credits-grid">
        <div></div>
        <div></div>
      </div>
    </div>
  </div>

  <video id="logoVideo" preload="auto" playsinline muted></video>

  <script>
    const API = 'https://script.google.com/macros/s/AKfycbxRufEbQXaXP4JtAgEnUep-yW5RzCh_qsStXUTEO_402rthriL6yL6XFsRS_Qw_f5TN6A/exec';

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    async function load() {
      try {
        const data = await fetch(API + '?action=getCredits').then(r => r.json());

        const left  = (data.items || []).filter(i => i.side === 'V').sort((a, b) => a.orden - b.orden);
        const right = (data.items || []).filter(i => i.side === 'H').sort((a, b) => a.orden - b.orden);

        function renderCol(items) {
          return items.map(item => {
            const navne = item.navne.split(/[\n,]/).map(n => n.trim()).filter(Boolean);
            return `
              <div class="credit-section">
                <div class="credit-titel">${esc(item.titel)}</div>
                ${navne.map(n => `<span class="credit-navn">${esc(n)}</span>`).join('')}
              </div>`;
          }).join('');
        }

        const grid = document.getElementById('creditsGrid');
        grid.children[0].innerHTML = renderCol(left);
        grid.children[1].innerHTML = renderCol(right);

        const speed   = data.speed || 30;
        const clip    = document.getElementById('clip');
        const wrapper = document.getElementById('wrapper');
        const video   = document.getElementById('logoVideo');

        // Sæt video src og lyt efter at den er klar
        video.src = 'DR_KREDITERINGSLOGO_INTERN_INGEN_TEKST_4SEK.webm';

        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            const clipH    = clip.offsetHeight;
            const contentH = wrapper.offsetHeight;

            // Fase 1: Blå boks glider op
            const slideMs = 800;
            clip.style.transition = `transform ${slideMs}ms ease-out`;
            clip.style.transform  = 'translateY(0)';

            // Fase 2: Tekst ruller indefra samtidig
            const startY   = clipH;
            const endY     = -contentH;
            const duration = speed * 1000;
            let startTime  = null;

            wrapper.style.transform = `translateY(${startY}px)`;

            function animate(ts) {
              if (!startTime) startTime = ts;
              const progress = Math.min((ts - startTime) / duration, 1);
              const y = startY + (endY - startY) * progress;
              wrapper.style.transform = `translateY(${y}px)`;

              if (progress < 1) {
                requestAnimationFrame(animate);
              } else {
                // Fase 3: Fade boks ud
                clip.style.transition = 'opacity 0.6s ease-out';
                clip.style.opacity = '0';
                setTimeout(() => {
                  clip.style.display = 'none';
                  // Fase 4: Vent 0.5 sek, vis logo-video
                  setTimeout(() => {
                    video.style.display = 'block';
                    const playPromise = video.play();
                    if (playPromise !== undefined) {
                      playPromise.catch(err => console.error('Video play fejl:', err));
                    }
                  }, 500);
                }, 600);
              }
            }

            requestAnimationFrame(animate);
          });
        });

      } catch (err) {
        console.error('Credits fejl:', err);
      }
    }

    load();
  </script>
</body>
</html>
