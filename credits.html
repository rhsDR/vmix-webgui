<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>Credits</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }

    #clip {
      position: fixed;
      left: 0; right: 0; bottom: -10vh;
      height: 40vh;
      background: linear-gradient(to top,
        rgba(0,0,75,0)    0%,
        rgba(0,0,75,0.04) 6%,
        rgba(0,0,75,0.12) 13%,
        rgba(0,0,75,0.25) 20%,
        rgba(0,0,75,0.42) 28%,
        rgba(0,0,75,0.62) 37%,
        rgba(0,0,75,0.78) 47%,
        rgba(0,0,75,0.90) 57%,
        rgb(0,0,75)       68%
      );
      overflow: hidden;
      transform: translateY(100%);
      opacity: 1;
    }

    #wrapper {
      position: absolute;
      left: 0; right: 0;
      padding: 0 9%;
      will-change: transform;
    }

    .credits-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      padding-bottom: 50px;
    }

    .credit-section { margin-bottom: 36px; }

    .credit-titel {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: rgb(255, 210, 0);
      margin-bottom: 4px;
    }

    .credit-navn {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 17px;
      font-weight: 400;
      color: rgb(255, 255, 255);
      line-height: 1.4;
      display: block;
    }

    #logoVideo {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      max-width: 80%;
      max-height: 80%;
    }
  </style>
</head>
<body>
  <div id="clip">
    <div id="wrapper">
      <div id="creditsGrid" class="credits-grid">
        <div></div>
        <div></div>
      </div>
    </div>
  </div>

  <video id="logoVideo" preload="auto" playsinline muted></video>

  <script>
    const SB_URL = 'https://rxzxdcweqpbnvfkpnnrn.supabase.co';
    const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ4enhkY3dlcXBibnZma3BubnJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMzYzMTUsImV4cCI6MjA5MDgxMjMxNX0.e6DtMVskOwcMyJBFJDIEYsSZC0HAcD7AhNcg5PvlArU';
    const SB_HEADERS = { 'apikey': SB_ANON, 'Authorization': 'Bearer ' + SB_ANON, 'Content-Type': 'application/json' };

    const projektId  = new URLSearchParams(window.location.search).get('p') || '';
    const pidFilter  = projektId ? '&projekt_id=eq.' + projektId : '';

    let animating = false;
    let creditsLoaded = false;
    let speed = 30;

    async function pollTrigger() {
      if (animating) return;
      try {
        const rows = await fetch(SB_URL + '/rest/v1/settings?key=eq.credits_trigger&select=value' + pidFilter, { headers: SB_HEADERS }).then(r => r.json());
        if (rows[0] && rows[0].value === 'in') {
          playAnimation();
          return;
        }
      } catch {}
      setTimeout(pollTrigger, 2000);
    }

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    async function loadCredits() {
      try {
        const [creditsRaw, settingsRaw] = await Promise.all([
          fetch(SB_URL + '/rest/v1/credits?select=*' + pidFilter, { headers: SB_HEADERS }).then(r => r.json()),
          fetch(SB_URL + '/rest/v1/settings?select=key,value' + pidFilter, { headers: SB_HEADERS }).then(r => r.json())
        ]);

        creditsLoaded = true;

        const speedRow = Array.isArray(settingsRaw) ? settingsRaw.find(r => r.key === 'credits_speed') : null;
        speed = speedRow ? parseFloat(speedRow.value) : 30;

        if (!Array.isArray(creditsRaw)) return;

        const items = creditsRaw.map(r => ({ row: r.id, side: r.side, orden: r.orden, titel: r.titel || '', navne: r.navne || '' }));
        const left  = items.filter(i => i.side === 'V').sort((a, b) => a.orden - b.orden);
        const right = items.filter(i => i.side === 'H').sort((a, b) => a.orden - b.orden);

        function renderCol(items) {
          return items.map(item => {
            const navne = item.navne.split(/[\n,]/).map(n => n.trim()).filter(Boolean);
            return `
              <div class="credit-section">
                <div class="credit-titel">${esc(item.titel)}</div>
                ${navne.map(n => `<span class="credit-navn">${esc(n)}</span>`).join('')}
              </div>`;
          }).join('');
        }

        if (items.length > 0) {
          const grid = document.getElementById('creditsGrid');
          grid.children[0].innerHTML = renderCol(left);
          grid.children[1].innerHTML = renderCol(right);
        }

      } catch (err) {
        console.error('Credits load fejl:', err);
        creditsLoaded = true;
      }
    }

    function resetState() {
      const clip    = document.getElementById('clip');
      const wrapper = document.getElementById('wrapper');
      const video   = document.getElementById('logoVideo');

      clip.style.transition = '';
      clip.style.transform  = 'translateY(100%)';
      clip.style.opacity    = '1';
      clip.style.display    = '';
      wrapper.style.transform = '';
      video.style.display   = 'none';
      video.pause();
      video.currentTime = 0;
      animating = false;
    }

    async function resetTrigger() {
      try {
        await fetch(SB_URL + '/rest/v1/settings?key=eq.credits_trigger' + pidFilter, {
          method: 'PATCH',
          headers: SB_HEADERS,
          body: JSON.stringify({ value: 'out' })
        });
      } catch (err) {
        console.error('Reset trigger fejl:', err);
      }
    }

    function playAnimation() {
      if (animating || !creditsLoaded) return;
      animating = true;

      const clip    = document.getElementById('clip');
      const wrapper = document.getElementById('wrapper');
      const video   = document.getElementById('logoVideo');

      video.src = 'DR_KREDITERINGSLOGO_INTERN_INGEN_TEKST_4SEK.webm';

      // Mål clip-højde (har eksplicit height: 40vh — virker altid)
      const clipH = clip.offsetHeight || (window.innerHeight * 0.4);

      // Mål indhold via clone udenfor clip — garanteret korrekt layout
      const clone = wrapper.cloneNode(true);
      clone.style.cssText = 'position:fixed;top:-9999px;left:0;right:0;visibility:hidden;transform:none;pointer-events:none;';
      document.body.appendChild(clone);
      const contentH = clone.offsetHeight;
      document.body.removeChild(clone);

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {

          // Fase 1: Blå boks glider op
          const slideMs = 800;
          clip.style.transition = `transform ${slideMs}ms ease-out`;
          clip.style.transform  = 'translateY(0)';

          const startY   = clipH;
          const endY     = -contentH;
          const duration = speed * 1000;
          let startTime  = null;

          wrapper.style.transform = `translateY(${startY}px)`;

          function animate(ts) {
            if (!startTime) startTime = ts;
            const progress = Math.min((ts - startTime) / duration, 1);
            const y = startY + (endY - startY) * progress;
            wrapper.style.transform = `translateY(${y}px)`;

            if (progress < 1) {
              requestAnimationFrame(animate);
            } else {
              // Fase 3: Fade boks ud
              clip.style.transition = 'opacity 0.6s ease-out';
              clip.style.opacity = '0';
              setTimeout(() => {
                clip.style.display = 'none';
                // Fase 4: Vent 0.5 sek, vis logo-video
                setTimeout(() => {
                  video.style.display = 'block';
                  const playPromise = video.play();
                  if (playPromise !== undefined) {
                    playPromise.catch(err => console.error('Video play fejl:', err));
                  }
                  // Fase 5: Når video er færdig → reset og sæt trigger tilbage til 0
                  video.onended = async () => {
                    await resetTrigger();
                    resetState();
                    setTimeout(pollTrigger, 2000);
                  };
                }, 500);
              }, 600);
            }
          }

          requestAnimationFrame(animate);
        });
      });
    }

    async function init() {
      await loadCredits();

      // Preview-tilstand: autostart uden trigger
      if (new URLSearchParams(window.location.search).get('preview') === '1') {
        playAnimation();
        return;
      }

      pollTrigger();
    }

    init();
  </script>
</body>
</html>
