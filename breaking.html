<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>Breaking Ticker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; }
  </style>
</head>
<body>
  <!-- Breaking Ticker overlay — IKKE IMPLEMENTERET ENDNU -->
  <!-- Trigger key: breaking_trigger (in / out) -->
  <!-- Data key:    breaking_data (JSON: { tekst, overskrift }) -->
  <!-- Reads breaking tickers from existing tickers table where breaking=true -->

  <script>
    const SB_URL  = 'https://rxzxdcweqpbnvfkpnnrn.supabase.co';
    const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ4enhkY3dlcXBibnZma3BubnJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMzYzMTUsImV4cCI6MjA5MDgxMjMxNX0.e6DtMVskOwcMyJBFJDIEYsSZC0HAcD7AhNcg5PvlArU';
    const SB_HDR  = { 'apikey': SB_ANON, 'Authorization': 'Bearer ' + SB_ANON, 'Content-Type': 'application/json' };

    const pid = new URLSearchParams(window.location.search).get('p') || '';
    const pf  = pid ? '&projekt_id=eq.' + encodeURIComponent(pid) : '';

    let animating = false;

    async function pollTrigger() {
      if (animating) return;
      try {
        const rows = await fetch(
          `${SB_URL}/rest/v1/settings?key=eq.breaking_trigger&select=value${pf}`,
          { headers: SB_HDR }
        ).then(r => r.json());
        const trigger = rows[0]?.value;
        if (trigger === 'in')  { runIN();  return; }
        if (trigger === 'out') { runOUT(); return; }
      } catch {}
      setTimeout(pollTrigger, 2000);
    }

    function runIN()  { /* TODO */ setTimeout(pollTrigger, 2000); }
    function runOUT() { /* TODO */ setTimeout(pollTrigger, 2000); }

    pollTrigger();
  </script>
</body>
</html>
