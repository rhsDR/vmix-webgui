<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>Overlay</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; }
    iframe {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <iframe id="lower-third-frame" allowtransparency="true" src=""></iframe>
  <iframe id="live-boks-frame"   allowtransparency="true" src=""></iframe>
  <iframe id="breaking-frame"    allowtransparency="true" src=""></iframe>
  <iframe id="ticker-frame"         allowtransparency="true" src=""></iframe>
  <iframe id="ticker-breaking-frame" allowtransparency="true" src=""></iframe>
  <iframe id="score-frame"          allowtransparency="true" src=""></iframe>
  <iframe id="score-breaking-frame"  allowtransparency="true" src=""></iframe>
  <iframe id="stilling-frame"    allowtransparency="true" src=""></iframe>
  <iframe id="opstilling-frame"  allowtransparency="true" src=""></iframe>
  <iframe id="credits-frame"     allowtransparency="true" src=""></iframe>

  <script>
    const SB_URL  = 'https://rxzxdcweqpbnvfkpnnrn.supabase.co';
    const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ4enhkY3dlcXBibnZma3BubnJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMzYzMTUsImV4cCI6MjA5MDgxMjMxNX0.e6DtMVskOwcMyJBFJDIEYsSZC0HAcD7AhNcg5PvlArU';
    const SB_HDR  = { 'apikey': SB_ANON, 'Authorization': 'Bearer ' + SB_ANON };

    // Grafik-definitioner: id matcher iframe-id og Supabase-nøglen i overlay_lag_order
    const GRAPHICS = [
      { id: 'lower-third', file: 'lower-third.html'    },
      { id: 'live-boks',   file: 'Graphics/LIve_bokse/Live_BOKS_gsap.html' },
      { id: 'breaking',    file: 'breaking.html'        },
      { id: 'ticker',          file: 'Graphics/Ticker/Ticker_gsap.html'  },
      { id: 'ticker-breaking', file: 'Graphics/Ticker/Ticker_breaking_gsap.html' },
      { id: 'score',           file: 'Graphics/Stillings_boks/Stillings_boks_uden_live_boks_gsap.html' },
      { id: 'score-breaking',  file: 'Graphics/Stillings_boks/Stillings_boks_BREAKING_uden_live_boks_supabase.html' },
      { id: 'stilling',    file: 'stilling.html'        },
      { id: 'opstilling',  file: 'opstilling.html'      },
      { id: 'credits',     file: 'credits.html'         },
    ];
    const DEFAULT_ORDER = GRAPHICS.map(g => g.id); // top→bund
    const DEFAULT_TICKER_SUB_ORDER = ['live-boks', 'breaking', 'ticker-breaking', 'score-breaking', 'ticker', 'score'];
    let tickerSubOrder = [...DEFAULT_TICKER_SUB_ORDER];

    const params  = new URLSearchParams(window.location.search);
    const pid     = params.get('p') || '';
    const pf      = pid ? '&projekt_id=eq.' + encodeURIComponent(pid) : '';
    const preview = params.get('preview') || '';

    // Sæt iframe-sources (preview overstyre normale sources)
    GRAPHICS.forEach(g => {
      const frame = document.getElementById(g.id + '-frame');
      if (!frame) return;
      let src = g.file + '?p=' + pid;
      if (preview === 'credits'             && g.id === 'credits')    src = g.file + '?preview=1&p=' + pid;
      if ((preview === 'home' || preview === 'away') && g.id === 'opstilling') src = g.file + '?preview=' + preview + '&p=' + pid;
      frame.src = src;
    });

    function applyOrder(mainOrder) {
      const total = mainOrder.length;
      mainOrder.forEach((id, idx) => {
        const baseZ = (total - idx) * 1000;
        if (id === 'ticker') {
          // Byg komplet sub-liste: bruger-rækkefølge + DEFAULT-items der ikke er med
          // (sikrer at ticker-breaking / score-breaking aldrig beholder et gammelt z-index)
          const allSubs = [...tickerSubOrder];
          DEFAULT_TICKER_SUB_ORDER.forEach(s => { if (!allSubs.includes(s)) allSubs.push(s); });
          allSubs.forEach((subId, subIdx) => {
            const frame = document.getElementById(subId + '-frame');
            if (frame) frame.style.zIndex = baseZ - subIdx * 10;
          });
        } else if (!tickerSubOrder.includes(id) && !DEFAULT_TICKER_SUB_ORDER.includes(id)) {
          // Sæt kun z-index for items der hverken er i den aktive eller den default ticker-sub-liste
          const frame = document.getElementById(id + '-frame');
          if (frame) frame.style.zIndex = baseZ;
        }
      });
    }

    async function pollLagOrder() {
      try {
        const [mainRows, subRows] = await Promise.all([
          fetch(`${SB_URL}/rest/v1/settings?key=eq.overlay_lag_order&select=value${pf}`, { headers: SB_HDR }).then(r => r.json()),
          fetch(`${SB_URL}/rest/v1/settings?key=eq.ticker_lag_order&select=value${pf}`,  { headers: SB_HDR }).then(r => r.json()),
        ]);
        const rawMain = mainRows[0]?.value || '';
        const rawSub  = subRows[0]?.value  || '';
        const mainOrder = rawMain ? rawMain.split(',').map(s => s.trim()).filter(Boolean) : DEFAULT_ORDER;
        tickerSubOrder  = rawSub  ? rawSub.split(',').map(s => s.trim()).filter(Boolean)  : DEFAULT_TICKER_SUB_ORDER;
        applyOrder(mainOrder);
      } catch {}
      setTimeout(pollLagOrder, 3000);
    }

    async function loadCustomGrafik() {
      if (!pid) return;
      let rows;
      try {
        rows = await fetch(
          `${SB_URL}/rest/v1/projekt_grafik?projekt_id=eq.${encodeURIComponent(pid)}&order=sort_order`,
          { headers: SB_HDR }
        ).then(r => r.json());
      } catch { return; }
      if (!Array.isArray(rows) || !rows.length) return;

      const customFrameMap = {};
      await Promise.all(rows.map(async g => {
        const frameId = 'custom-' + g.id.slice(0, 8) + '-frame';
        if (document.getElementById(frameId)) return;
        let html;
        try { html = await fetch(g.file_url).then(r => r.text()); } catch { return; }
        // Bloker Supabase realtime i iframen — overlay.html poller og kalder contentWindow.runAnimationIN/OUT direkte
        const inject = `<script>window.__PROJEKT_ID=${JSON.stringify(pid)};window.__IS_PREVIEW=false;Object.defineProperty(window,'supabase',{value:{createClient:()=>({channel:()=>({on:()=>({on:()=>({subscribe:()=>{}}),subscribe:()=>{}}),subscribe:()=>{}})})},writable:false,configurable:false});<\/script>`;
        html = html.replace(/(<html[^>]*>)/i, '$1' + inject);
        const blob = new Blob([html], { type: 'text/html' });
        const blobUrl = URL.createObjectURL(blob);
        const iframe = document.createElement('iframe');
        iframe.id = frameId;
        iframe.allowTransparency = true;
        iframe.src = blobUrl;
        iframe.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;border:none;background:transparent;pointer-events:none;';
        document.body.appendChild(iframe);
        DEFAULT_ORDER.push('custom-' + g.id.slice(0, 8));
        customFrameMap[g.trigger_key] = iframe;
      }));
      applyOrder(DEFAULT_ORDER);

      // Overlay.html poller selv for trigger-aendringer og kalder
      // animationsfunktionerne direkte i iframens contentWindow.
      // Dette undgaar afhengighed af at iframen selv kan lave WebSocket.
      const trigKeys = Object.keys(customFrameMap);
      if (!trigKeys.length) return;
      // Initialiser state som 'out' saa foerste poll ikke kalder runAnimationOUT unødigt
      const customState = Object.fromEntries(trigKeys.map(k => [k, 'out']));
      async function pollCustomTriggers() {
        try {
          const data = await fetch(
            `${SB_URL}/rest/v1/settings?key=in.(${trigKeys.join(',')})&projekt_id=eq.${encodeURIComponent(pid)}&select=key,value`,
            { headers: SB_HDR }
          ).then(r => r.json());
          if (Array.isArray(data)) {
            for (const row of data) {
              if (customState[row.key] === row.value) continue;
              customState[row.key] = row.value;
              const iframe = customFrameMap[row.key];
              if (!iframe) continue;
              try {
                if (row.value === 'in') iframe.contentWindow?.runAnimationIN?.();
                else if (row.value === 'out') iframe.contentWindow?.runAnimationOUT?.();
              } catch {}
            }
          }
        } catch {}
        setTimeout(pollCustomTriggers, 1500);
      }
      pollCustomTriggers();

      // Broadcast fast path — reagerer øjeblikkeligt i stedet for at vente på næste poll
      const _sbBc = window.supabase.createClient(SB_URL, SB_ANON);
      _sbBc.channel('triggers-' + pid)
        .on('broadcast', { event: 'trigger' }, function(msg) {
          const p = msg.payload;
          if (p.projekt_id !== pid) return;
          const iframe = customFrameMap[p.key];
          if (!iframe) return;
          customState[p.key] = p.value; // sync state så pollCustomTriggers springer det over
          try {
            if (p.value === 'in') iframe.contentWindow?.runAnimationIN?.();
            else if (p.value === 'out') iframe.contentWindow?.runAnimationOUT?.();
          } catch {}
        })
        .subscribe();
    }

    // Sæt standard-rækkefølge med det samme og start polling med det samme.
    // loadCustomGrafik kører parallelt; næste poll-iteration vil inkludere
    // de custom-frames der er tilføjet til DEFAULT_ORDER undervejs.
    applyOrder(DEFAULT_ORDER);
    pollLagOrder();
    loadCustomGrafik();
  </script>
</body>
</html>
