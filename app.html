<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vMix Live Control</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/auth.js"></script>
  <link rel="stylesheet" href="app.css">
</head>
<body>

<!-- PAGE LOADER -->
<div id="pageLoader" style="position:fixed;inset:0;background:#111111;z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity 0.2s;">
  <div style="color:#333;font-size:11px;letter-spacing:4px;font-family:'Segoe UI',system-ui,sans-serif;font-weight:700;">INDLÆSER</div>
</div>

<!-- HEADER -->
<header class="header">
  <div style="display:flex;align-items:center;gap:12px;">
    <button class="icon-btn" id="backBtn" title="Alle projekter" style="font-size:18px;color:var(--muted);">‹</button>
    <div class="header-title"><span>VMIX LIVE</span><span class="control">C O N T R O L</span></div>
  </div>
  <img class="header-logo" src="logo.png" alt="DR">
  <div style="display:flex;align-items:center;gap:12px;">
    <span id="projectUndertitel" style="font-size:12px;color:#555;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
    <button class="icon-btn" id="playBtn" title="Afspil sang" style="font-size:20px;color:var(--orange);">▶</button>
    <div class="clock" id="clock">00.00.00</div>
    <button class="tab-btn" data-tab="admin" style="font-size:11px;padding:4px 10px;letter-spacing:1px;">STAMDATA</button>
    <button class="icon-btn" id="logoutBtn" title="Log ud" style="font-size:14px;color:var(--muted);">⏏</button>
  </div>
</header>

<!-- TABS -->
<nav class="tabs">
  <button class="tab-btn active" data-tab="kampe">KAMPE</button>
  <button class="tab-btn" data-tab="subs">SUBS</button>
  <button class="tab-btn" data-tab="ticker">TICKER</button>
  <button class="tab-btn" data-tab="credits">CREDITS</button>
  <button class="tab-btn" data-tab="live">DASHBOARD</button>
</nav>

<!-- TAB: KAMPE -->
<div id="tab-kampe" class="tab-pane active">
  <div class="kamp-list" id="kampList">
    <div class="loading">Henter data…</div>
  </div>
</div>

<!-- TAB: SUBS -->
<div id="tab-subs" class="tab-pane">
  <div id="subsList"><div class="loading">Henter data…</div></div>
</div>

<!-- TAB: STAMDATA -->
<div id="tab-admin" class="tab-pane">
  <div class="stamdata-grid">

    <div class="stamdata-section">
      <div class="stamdata-header">Kommentatorer</div>
      <div class="stamdata-list" id="sdKommList"></div>
      <div class="stamdata-add-row">
        <input class="stamdata-input" id="sdKommInput" type="text" placeholder="Navn…" style="flex:2;">
        <input class="stamdata-input" id="sdKommTitelInput" type="text" placeholder="Titel…" style="flex:2;">
        <button class="stamdata-btn" id="sdKommBtn">Tilføj</button>
      </div>
    </div>

    <div class="stamdata-section hold">
      <div class="stamdata-header">Hold</div>
      <div class="stamdata-list" id="sdHoldList"></div>
      <div class="stamdata-add-row">
        <input class="stamdata-input" id="sdHoldLangInput" type="text" placeholder="Fuldt navn…" style="flex:2;">
        <input class="stamdata-input" id="sdHoldKortInput" type="text" placeholder="Kort…" style="flex:1;max-width:80px;">
        <input class="stamdata-input" id="sdHoldApiInput" type="text" placeholder="API alias…" style="flex:2;">
        <button class="stamdata-btn" id="sdHoldBtn">Tilføj</button>
      </div>
    </div>

    <div class="stamdata-section">
      <div class="stamdata-header">Lokationer</div>
      <div class="stamdata-list" id="sdLokList"></div>
      <div class="stamdata-add-row">
        <input class="stamdata-input" id="sdLokInput" type="text" placeholder="Lokation…">
        <button class="stamdata-btn" id="sdLokBtn">Tilføj</button>
      </div>
    </div>

  </div>
</div>

<!-- TAB: TICKER -->
<div id="tab-ticker" class="tab-pane">
  <div id="tickerList"><div class="loading">Henter data…</div></div>
</div>

<!-- TAB: CREDITS -->
<div id="tab-credits" class="tab-pane">
  <div id="creditsList"><div class="loading">Henter data…</div></div>
</div>

<!-- TAB: LIVE -->
<div id="tab-live" class="tab-pane">
  <div id="liveGrid" class="live-grid"><div class="live-no-fixtures">INGEN KAMPE VALGT</div></div>
  <div class="live-updated" id="liveUpdated"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- CREDITS PREVIEW MODAL -->
<div class="preview-modal" id="previewModal" style="display:none;">
  <div class="preview-modal-inner">
    <button class="preview-close" id="previewClose">✕</button>
    <iframe id="previewFrame" src=""></iframe>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
