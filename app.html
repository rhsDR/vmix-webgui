<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vMix Live Control</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/auth.js"></script>
  <link rel="stylesheet" href="app.css">
</head>
<body>

<!-- PAGE LOADER -->
<div id="pageLoader" style="position:fixed;inset:0;background:#111111;z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity 0.2s;">
  <div style="color:#333;font-size:11px;letter-spacing:4px;font-family:'Segoe UI',system-ui,sans-serif;font-weight:700;">INDLÆSER</div>
</div>

<!-- HEADER -->
<header class="header">
  <div style="display:flex;align-items:center;gap:12px;">
    <button class="icon-btn" id="backBtn" title="Alle projekter" style="font-size:18px;color:var(--muted);">‹</button>
    <div class="header-title"><span>VMIX LIVE</span><span class="control">C O N T R O L</span></div>
  </div>
  <img class="header-logo" src="logo.png" alt="DR">
  <div style="display:flex;align-items:center;gap:12px;">
    <span id="projectUndertitel" style="font-size:12px;color:#555;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
    <button class="icon-btn" id="playBtn" title="Afspil sang" style="font-size:20px;color:var(--orange);">▶</button>
    <div class="clock" id="clock">00.00.00</div>
    <button class="tab-btn" data-tab="admin" style="font-size:11px;padding:4px 10px;letter-spacing:1px;">STAMDATA</button>
    <button class="icon-btn" id="logoutBtn" title="Log ud" style="font-size:14px;color:var(--muted);">⏏</button>
  </div>
</header>

<!-- TABS -->
<nav class="tabs">
  <button class="tab-btn active" data-tab="kampe">KAMPE</button>
  <button class="tab-btn" data-tab="subs">SUBS</button>
  <button class="tab-btn" data-tab="ticker">TICKER</button>
  <button class="tab-btn" data-tab="credits">CREDITS</button>
  <button class="tab-btn" data-tab="grafik">GRAFIK</button>
  <button class="tab-btn" data-tab="live">DASHBOARD</button>
</nav>

<!-- TAB: KAMPE -->
<div id="tab-kampe" class="tab-pane active">
  <div class="kamp-list" id="kampList">
    <div class="loading">Henter data…</div>
  </div>
</div>

<!-- TAB: SUBS -->
<div id="tab-subs" class="tab-pane">
  <div id="subsList"><div class="loading">Henter data…</div></div>
</div>

<!-- TAB: STAMDATA -->
<div id="tab-admin" class="tab-pane">
  <div class="stamdata-grid">

    <div class="stamdata-section">
      <div class="stamdata-header">Kommentatorer</div>
      <div class="stamdata-list" id="sdKommList"></div>
      <div class="stamdata-add-row">
        <input class="stamdata-input" id="sdKommInput" type="text" placeholder="Navn…" style="flex:2;">
        <input class="stamdata-input" id="sdKommTitelInput" type="text" placeholder="Titel…" style="flex:2;">
        <button class="stamdata-btn" id="sdKommBtn">Tilføj</button>
      </div>
    </div>

    <div class="stamdata-section hold">
      <div class="stamdata-header">Hold</div>
      <div class="stamdata-list" id="sdHoldList"></div>
      <div class="stamdata-add-row">
        <input class="stamdata-input" id="sdHoldLangInput" type="text" placeholder="Fuldt navn…" style="flex:2;">
        <input class="stamdata-input" id="sdHoldKortInput" type="text" placeholder="Kort…" style="flex:1;max-width:80px;">
<input class="stamdata-input" id="sdHoldEnetInput" type="text" placeholder="Enet alias…" style="flex:2;">
        <button class="stamdata-btn" id="sdHoldBtn">Tilføj</button>
      </div>
    </div>

    <div class="stamdata-section">
      <div class="stamdata-header">Lokationer</div>
      <div class="stamdata-list" id="sdLokList"></div>
      <div class="stamdata-add-row">
        <input class="stamdata-input" id="sdLokInput" type="text" placeholder="Lokation…">
        <button class="stamdata-btn" id="sdLokBtn">Tilføj</button>
      </div>
    </div>

  </div>
</div>

<!-- TAB: TICKER -->
<div id="tab-ticker" class="tab-pane">
  <div id="tickerList"><div class="loading">Henter data…</div></div>
</div>

<!-- TAB: CREDITS -->
<div id="tab-credits" class="tab-pane">
  <div id="creditsList"><div class="loading">Henter data…</div></div>
</div>

<!-- TAB: GRAFIK -->
<div id="tab-grafik" class="tab-pane">
  <div id="grafikList"><div class="loading">Henter data…</div></div>
</div>

<!-- TAB: LIVE -->
<div id="tab-live" class="tab-pane">
  <div id="liveGrid" class="live-grid"><div class="live-no-fixtures">INGEN KAMPE VALGT</div></div>
  <div class="live-updated" id="liveUpdated"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- PLAYER MODAL -->
<div class="player-modal" id="playerModal" style="display:none;">
  <div class="player-modal-inner">
    <button class="player-modal-close" id="playerModalClose">✕</button>
    <div id="playerModalContent"></div>
  </div>
</div>

<!-- CREDITS PREVIEW MODAL -->
<div class="preview-modal" id="previewModal" style="display:none;">
  <div class="preview-modal-inner">
    <button class="preview-close" id="previewClose">✕</button>
    <iframe id="previewFrame" src=""></iframe>
  </div>
</div>

<!-- EGNE GRAFIK: UPLOAD MODAL -->
<div id="egne-grafik-modal" style="position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:9000;display:none;align-items:center;justify-content:center;">
  <div style="background:#1a1a1a;border:1px solid #333;border-radius:10px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.7);display:flex;flex-direction:column;">
    <div style="padding:14px 16px;border-bottom:1px solid #2a2a2a;font-size:12px;letter-spacing:2px;color:#aaa;">TILFØJ GRAFIK</div>
    <div style="padding:16px;display:flex;flex-direction:column;gap:12px;">
      <div>
        <label style="font-size:10px;color:#666;display:block;margin-bottom:4px;letter-spacing:1px;">HTML-FIL</label>
        <input id="egne-file-inp" type="file" accept=".html"
          style="width:100%;background:#111;border:1px solid #333;color:#ccc;padding:6px;border-radius:6px;font-size:11px;">
      </div>
      <div>
        <label style="font-size:10px;color:#666;display:block;margin-bottom:4px;letter-spacing:1px;">LABEL</label>
        <input id="egne-label-inp" type="text" placeholder="Min grafik…"
          style="width:100%;background:#111;border:1px solid #333;color:#ccc;padding:6px;border-radius:6px;font-size:12px;">
      </div>
      <div>
        <label style="font-size:10px;color:#666;display:block;margin-bottom:4px;letter-spacing:1px;">TRIGGER-NØGLE</label>
        <div style="display:flex;gap:6px;">
          <select id="egne-trig-sel" style="flex:1;background:#111;border:1px solid #333;color:#ccc;padding:6px;border-radius:6px;font-size:11px;">
            <option value="ticker_ovl_trigger">ticker_ovl_trigger</option>
            <option value="breaking_trigger">breaking_trigger</option>
            <option value="score_trigger">score_trigger</option>
            <option value="stilling_trigger">stilling_trigger</option>
            <option value="credits_trigger">credits_trigger</option>
            <option value="custom">Brugerdefineret…</option>
          </select>
          <input id="egne-trig-custom" type="text" placeholder="min_trigger"
            style="display:none;flex:1;background:#111;border:1px solid #333;color:#ccc;padding:6px;border-radius:6px;font-size:11px;">
        </div>
      </div>
      <div>
        <label style="font-size:10px;color:#666;display:block;margin-bottom:4px;letter-spacing:1px;">FARVE</label>
        <input id="egne-color-inp" type="color" value="#888888"
          style="height:32px;width:60px;background:#111;border:1px solid #333;border-radius:6px;cursor:pointer;padding:2px;">
      </div>
    </div>
    <div style="display:flex;gap:8px;padding:12px 16px;border-top:1px solid #2a2a2a;">
      <button onclick="closeEgneGrafikModal()" style="flex:1;padding:8px;background:#222;border:1px solid #333;color:#aaa;border-radius:6px;cursor:pointer;font-size:11px;">Annuller</button>
      <button id="egne-upload-btn" onclick="_confirmEgneGrafik()" style="flex:2;padding:8px;background:#1a3a1a;border:1px solid #2d5a2d;color:#86efac;border-radius:6px;cursor:pointer;font-size:11px;letter-spacing:1px;">↑ UPLOAD &amp; TILFØJ</button>
    </div>
  </div>
</div>

<!-- MAKRO MODAL -->
<div id="makro-modal" style="position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:9000;display:none;align-items:center;justify-content:center;">
  <div style="background:#1a1a1a;border:1px solid #333;border-radius:10px;width:420px;box-shadow:0 20px 60px rgba(0,0,0,.7);display:flex;flex-direction:column;">
    <div style="padding:14px 16px;border-bottom:1px solid #2a2a2a;font-size:12px;letter-spacing:2px;color:#aaa;">MAKRO</div>
    <input type="hidden" id="makro-modal-id">
    <div style="padding:16px;display:flex;flex-direction:column;gap:12px;">
      <div>
        <label style="font-size:10px;color:#666;display:block;margin-bottom:4px;letter-spacing:1px;">NAVN</label>
        <input id="makro-label-inp" type="text" placeholder="Scene 1…"
          style="width:100%;box-sizing:border-box;background:#111;border:1px solid #333;color:#ccc;padding:6px;border-radius:6px;font-size:12px;">
      </div>
      <div>
        <label style="font-size:10px;color:#666;display:block;margin-bottom:4px;letter-spacing:1px;">FARVE</label>
        <input id="makro-color-inp" type="color" value="#4a9eff"
          style="height:32px;width:60px;background:#111;border:1px solid #333;border-radius:6px;cursor:pointer;padding:2px;">
      </div>
      <div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
          <label style="font-size:10px;color:#666;letter-spacing:1px;">HANDLINGER</label>
          <button onclick="_addMakroHandling()" style="font-size:10px;padding:2px 8px;background:#1a3a1a;border:1px solid #2d5a2d;color:#86efac;border-radius:4px;cursor:pointer;">＋ Tilføj</button>
        </div>
        <div id="makro-handlinger-list" style="display:flex;flex-direction:column;gap:4px;background:#0d0d0d;border:1px solid #2a2a2a;border-radius:8px;padding:8px;min-height:44px;"></div>
      </div>
    </div>
    <div style="display:flex;gap:8px;padding:12px 16px;border-top:1px solid #2a2a2a;">
      <button onclick="_closeMakroModal()" style="flex:1;padding:8px;background:#222;border:1px solid #333;color:#aaa;border-radius:6px;cursor:pointer;font-size:11px;">Annuller</button>
      <button onclick="_confirmMakroModal()" style="flex:2;padding:8px;background:#1a3a1a;border:1px solid #2d5a2d;color:#86efac;border-radius:6px;cursor:pointer;font-size:11px;letter-spacing:1px;">GEM MAKRO</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
