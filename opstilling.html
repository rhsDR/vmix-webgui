    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: 'DRPublik-Bold', 'Segoe UI', Arial, sans-serif;
    }

    /* ── WRAPPER ─────────────────────────────────────────────── */
    #gfx {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    #gfx.visible { opacity: 1; }

    /* ── HEADER ──────────────────────────────────────────────── */
    #header {
      height: 72px;
      flex-shrink: 0;
      background: rgba(0, 0, 44, 0.96);
      border-bottom: 3px solid rgba(255, 210, 0, 0.75);
      display: flex;
      align-items: center;
      padding: 0 64px;
      gap: 20px;
      transform: translateY(-100%);
      opacity: 0;
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1),
                  opacity 0.4s ease;
    }
    #header.visible {
      transform: translateY(0);
      opacity: 1;
    }
    #teamLogo {
      width: 48px; height: 48px;
      object-fit: contain;
      flex-shrink: 0;
    }
    #teamName {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      flex: 1;
    }
    #teamFormation {
      font-size: 15px;
      font-weight: 700;
      color: rgb(255, 210, 0);
      letter-spacing: 4px;
    }

    /* ── HALVBANE ─────────────────────────────────────────────── */
    #pitch-area {
      flex: 1;
      position: relative;
      background: #0d1f0d;
      overflow: hidden;
    }
    #pitch-area svg.pitch-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* ── SPILLERE ─────────────────────────────────────────────── */
    .pitch-player {
      position: absolute;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      opacity: 0;
      scale: 0.5;
      transition: opacity 0.35s ease, scale 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
    }
    .pitch-player.visible {
      opacity: 1;
      scale: 1;
    }

    .p-photo-wrap {
      position: relative;
      width: 160px; height: 160px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .p-photo {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .p-num {
      position: absolute;
      bottom: 2px; right: 2px;
      font-size: 14px; font-weight: 700;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.9);
      line-height: 1;
    }

    .p-name {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: center;
      text-shadow: 0 1px 6px rgba(0,0,0,1), 0 0 12px rgba(0,0,0,0.9);
      line-height: 1.2;
    }
    .p-name-first {
      font-size: 13px;
      font-weight: 400;
      color: rgba(255,255,255,0.7);
      display: block;
    }
    .p-name-last {
      font-size: 17px;
      font-weight: 700;
      display: block;
    }
  </style>
</head>

    function esc(s) {
      return String(s || '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function lastName(name) {
      const parts = String(name || '').trim().split(' ');
      return parts.length > 1 ? parts.slice(1).join(' ') : parts[0];
    }
    function firstName(name) {
      return String(name || '').trim().split(' ')[0] || '';
    }

    function calcFormation(players) {
      const st = (players || []).filter(p => p.starter);
      const d  = st.filter(p => p.pos === 'FB').length;
      const m  = st.filter(p => p.pos === 'MF').length;
      const f  = st.filter(p => p.pos === 'A').length;
      return (d || m || f) ? `${d}-${m}-${f}` : PLACEHOLDER_LOGO;
    }

    // ── DOM-HELPERS ───────────────────────────────────────────────
    function setHeader(side) {
      const team = lineupData?.[side] || {};
      document.getElementById('teamName').textContent = (team.name || '').toUpperCase();
      document.getElementById('teamFormation').textContent =
        team.formation || calcFormation(team.players);
      const logoEl = document.getElementById('teamLogo');
      logoEl.style.display = '';
      logoEl.src = team.partFK
        ? `/api/team-image?teamFK=${encodeURIComponent(team.partFK)}`
        : PLACEHOLDER_LOGO;
    }

    function buildPlayers(side) {
      const team    = lineupData?.[side] || {};
      const players = (team.players || []).filter(p => p.starter);
      const partFK  = team.partFK || '';
      const CDN = 'https://driu3sl4x7vty.cloudfront.net/spdk/current/524x584';

      const pitchArea = document.getElementById('pitch-area');
      pitchArea.querySelectorAll('.pitch-player').forEach(el => el.remove());

      const zones = { MV: [], FB: [], MF: [], A: [] };
      for (const p of players) (zones[p.pos] || zones.MF).push(p);

      for (const [pos, group] of Object.entries(zones)) {
        if (!group.length) continue;
        const y = ZONE_Y[pos] ?? 50;
        group.forEach((p, i) => {
          const x = ((i + 1) / (group.length + 1) * 100).toFixed(1);
          const el = document.createElement('div');
          el.className = 'pitch-player';
          el.style.left = x + '%';
          el.style.top  = y + '%';

          const fn = esc(firstName(p.name));
          const ln = esc(lastName(p.name));
          const photoSrc = (partFK && p.id)
            ? `${CDN}/${encodeURIComponent(partFK)}/${encodeURIComponent(p.id)}.png`
            : PHOTO_PLACEHOLDER;

          el.innerHTML = `
            <div class="p-photo-wrap">
              <img class="p-photo" src="${photoSrc}" alt=""
                   onerror="this.onerror=null;this.src=PHOTO_PLACEHOLDER">
              <span class="p-num">${esc(p.shirt)}</span>
            </div>
            <div class="p-name">
              <span class="p-name-first">${fn}</span>
              <span class="p-name-last">${ln}</span>
            </div>`;

          pitchArea.appendChild(el);
        });
      }
    }

    // ── ANIMATION ─────────────────────────────────────────────────
    function getPlayerEls() {
      return [...document.querySelectorAll('.pitch-player')];
    }

    function animatePlayers(players, direction, baseDelay, interval, cb) {
      const list = direction === 'out' ? [...players].reverse() : players;
      list.forEach((el, i) => {
        setTimeout(() => {
          el.classList.toggle('visible', direction === 'in');
        }, baseDelay + i * interval);
      });
      if (cb) setTimeout(cb, baseDelay + list.length * interval + 100);
    }

    function showSide(side) {
      if (animating) return;
      animating = true;

      const gfx    = document.getElementById('gfx');
      const header = document.getElementById('header');

      if (currentSide === null) {
        // Første gang: alt fader ind fra ingenting
        setHeader(side);
        buildPlayers(side);
        gfx.classList.add('visible');
        setTimeout(() => header.classList.add('visible'), 100);
        setTimeout(() => {
          animatePlayers(getPlayerEls(), 'in', 0, 60, () => {
            currentSide = side;
            animating   = false;
            setTimeout(pollTrigger, 2000);
          });
        }, 500);
      } else {
        // Overgang: fade spillere ud, skift header, fade nye spillere ind
        animatePlayers(getPlayerEls(), 'out', 0, 40, () => {
          setHeader(side);
          buildPlayers(side);
          setTimeout(() => {
            animatePlayers(getPlayerEls(), 'in', 0, 60, () => {
              currentSide = side;
              animating   = false;
              setTimeout(pollTrigger, 2000);
            });
          }, 200);
        });
      }
    }

    function hideSide() {
      if (animating) return;
      animating = true;

      const gfx    = document.getElementById('gfx');
      const header = document.getElementById('header');

      animatePlayers(getPlayerEls(), 'out', 0, 40, () => {
        header.classList.remove('visible');
        setTimeout(() => {
          gfx.classList.remove('visible');
          setTimeout(async () => {
            await resetTrigger();
            currentSide = null;
            animating   = false;
            setTimeout(pollTrigger, 2000);
          }, 350);
        }, 300);
      });
    }

    async function resetTrigger() {
      try {
        await fetch(`${SB_URL}/rest/v1/settings?key=eq.lineup_trigger${pidFilter}`,
          { method: 'PATCH', headers: SB_HDR, body: JSON.stringify({ value: 'out' }) });
      } catch {}
    }

    // ── POLLING ───────────────────────────────────────────────────
    async function pollTrigger() {
      if (animating) return;
      try {
        const rows = await fetch(
          `${SB_URL}/rest/v1/settings?select=key,value&key=in.(lineup_trigger,lineup_data)${pidFilter}`,
          { headers: SB_HDR }
        ).then(r => r.json());

        const trigger = rows.find(r => r.key === 'lineup_trigger')?.value;
        const dataStr = rows.find(r => r.key === 'lineup_data')?.value;

        if (trigger !== 'out' && dataStr) {
          try { lineupData = JSON.parse(dataStr); } catch { lineupData = null; }
        }

        if ((trigger === 'home' || trigger === 'away') && trigger !== currentSide && lineupData) {
          showSide(trigger);
          return;
        }
        if (trigger === 'out' && currentSide !== null) {
          hideSide();
          return;
        }
      } catch {}
      setTimeout(pollTrigger, 2000);
    }

    // ── PREVIEW ───────────────────────────────────────────────────
    function getDemoData() {
      return {
        home: {
          name: 'FC København', partFK: '', formation: '4-3-3',
          players: [
            { id: '', shirt: 1,  name: 'Kamil Grabara',     pos: 'MV', starter: true },
            { id: '', shirt: 5,  name: 'Kevin Diks',         pos: 'FB', starter: true },
            { id: '', shirt: 3,  name: 'Davit Khocholava',   pos: 'FB', starter: true },
            { id: '', shirt: 4,  name: 'Diogo Gonçalves',    pos: 'FB', starter: true },
            { id: '', shirt: 22, name: 'Elias Jelert',        pos: 'FB', starter: true },
            { id: '', shirt: 6,  name: 'Lukas Lerager',       pos: 'MF', starter: true },
            { id: '', shirt: 8,  name: 'Viktor Claesson',     pos: 'MF', starter: true },
            { id: '', shirt: 10, name: 'Roony Bardghji',      pos: 'MF', starter: true },
            { id: '', shirt: 11, name: 'Mohamed Daramy',      pos: 'A',  starter: true },
            { id: '', shirt: 9,  name: 'Hákon Haraldsson',    pos: 'A',  starter: true },
            { id: '', shirt: 7,  name: 'Andreas Cornelius',   pos: 'A',  starter: true },
          ]
        },
        away: {
          name: 'Brøndby IF', partFK: '', formation: '4-4-2',
          players: [
            { id: '', shirt: 1,  name: 'Mads Hermansen',     pos: 'MV', starter: true },
            { id: '', shirt: 4,  name: 'Kevin Mensah',        pos: 'FB', starter: true },
            { id: '', shirt: 5,  name: 'Anthony Jung',        pos: 'FB', starter: true },
            { id: '', shirt: 3,  name: 'Josip Radošević',     pos: 'FB', starter: true },
            { id: '', shirt: 2,  name: 'Tobias Børkeeiet',    pos: 'FB', starter: true },
            { id: '', shirt: 6,  name: 'Yuito Suzuki',        pos: 'MF', starter: true },
            { id: '', shirt: 8,  name: 'Mathias Greve',       pos: 'MF', starter: true },
            { id: '', shirt: 10, name: 'Jesper Lindstrøm',    pos: 'MF', starter: true },
            { id: '', shirt: 11, name: 'Blas Riveros',        pos: 'MF', starter: true },
            { id: '', shirt: 9,  name: 'Mikael Uhre',         pos: 'A',  starter: true },
            { id: '', shirt: 7,  name: 'Simon Hedlund',       pos: 'A',  starter: true },
          ]
        }
      };
    }

    const previewSide = params.get('preview');
    if (previewSide === '1' || previewSide === 'home' || previewSide === 'away') {
      const side = previewSide === 'away' ? 'away' : 'home';
      try {
        const rows = await fetch(
          ${SB_URL}/rest/v1/settings?select=key,value&key=in.(lineup_data) + pidFilter,
          { headers: SB_HDR }
        ).then(r => r.json());
        const dataStr = rows.find(r => r.key === 'lineup_data')?.value;
        lineupData = dataStr ? JSON.parse(dataStr) : getDemoData();
      } catch {
        lineupData = getDemoData();
      }
      showSide(side);
    } else {
      pollTrigger();
    }
  </script>
