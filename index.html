<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vMix Control — Log ind</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #e5e5e5;
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
    }

    .login-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .login-logo img {
      height: 32px;
    }

    .login-logo span {
      font-size: 18px;
      font-weight: 600;
      color: #f97316;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e5e5e5;
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus {
      border-color: #f97316;
    }

    .login-btn {
      width: 100%;
      margin-top: 24px;
      padding: 12px;
      background: #f97316;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .login-btn:hover { background: #ea6a0a; }
    .login-btn:disabled { background: #7c3c10; cursor: default; }

    .error-msg {
      margin-top: 14px;
      padding: 10px 14px;
      background: #2a1010;
      border: 1px solid #5a2020;
      border-radius: 8px;
      color: #f87171;
      font-size: 13px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">
      <img src="logo.png" alt="DR">
      <span>vMix Control</span>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label>Adgangskode</label>
        <input type="password" id="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="login-btn" id="loginBtn">Log ind</button>
      <div class="error-msg" id="errorMsg"></div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/auth.js"></script>
  <script>
    redirectIfLoggedIn();

    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errorMsg');
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      btn.disabled = true;
      btn.textContent = 'Logger ind…';
      err.style.display = 'none';

      const { error } = await sbClient.auth.signInWithPassword({ email, password });

      if (error) {
        err.textContent = 'Forkert email eller adgangskode.';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Log ind';
      } else {
        window.location.href = 'projects.html';
      }
    });
  </script>
</body>
</html>
