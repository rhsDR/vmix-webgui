<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vMix Live Control</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #111111;
      --card:        #1c1c1c;
      --card-border: #2a2a2a;
      --text:        #ffffff;
      --muted:       #777777;
      --orange:      #f97316;
      --red:         #ef4444;
      --blue:        #3b82f6;
      --green:       #22c55e;
      --input-bg:    #0d0d0d;
      --yellow:      #eab308;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      font-size: 14px;
    }

    /* ── Header ───────────────────────────────────────────── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px clamp(8px, 22vw, 340px);
      border-bottom: 1px solid #252525;
      position: relative;
    }
    .header-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 3px;
      line-height: 1.3;
      display: flex;
      flex-direction: column;
    }
    .header-title .control {
      display: flex;
      justify-content: space-between;
      letter-spacing: normal;
    }
    .header-logo {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      height: 36px;
    }
    .clock {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 4px;
      border: 2px solid #fff;
      padding: 5px 14px;
      font-variant-numeric: tabular-nums;
    }

    /* ── Tabs ─────────────────────────────────────────────── */
    .tabs {
      display: flex;
      gap: 6px;
      padding: 12px clamp(8px, 22vw, 340px);
      border-bottom: 1px solid #252525;
    }
    .tab-btn {
      padding: 5px 16px;
      border: 1px solid #333;
      background: transparent;
      color: #666;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      border-radius: 4px;
      transition: all 0.15s;
    }
    .tab-btn:hover { color: #ccc; border-color: #555; }
    .tab-btn.active { background: var(--orange); border-color: var(--orange); color: #fff; }

    .tab-pane { display: none; padding: 20px clamp(8px, 22vw, 340px); }
    .tab-pane.active { display: block; }
    .coming-soon { padding: 60px; text-align: center; color: #333; font-size: 12px; letter-spacing: 3px; }

    /* ── Kamp list ────────────────────────────────────────── */
    .kamp-list { display: flex; flex-direction: column; gap: 20px; padding-bottom: 40px; }

    /* ── Kamp block ───────────────────────────────────────── */
    .kamp-block {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }
    /* Red left border */
    .kamp-block::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 6px;
      background: transparent;
      transition: background 0.2s;
      z-index: 1;
    }
    .kamp-block.on-air::before { background: var(--red); }

    /* ── Block header ─────────────────────────────────────── */
    .kamp-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px 10px 16px;
      cursor: pointer;
      user-select: none;
    }
    .kamp-header-left  { display: flex; align-items: center; gap: 12px; flex: 1; }
    .kamp-header-center { flex: 1; text-align: center; }
    .kamp-header-right { display: flex; align-items: center; gap: 4px; flex: 1; justify-content: flex-end; }

    .on-air-btn {
      padding: 3px 11px;
      border-radius: 20px;
      border: 1px solid #555;
      background: transparent;
      color: #666;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .on-air-btn.active { border-color: var(--red); background: var(--red); color: #fff; }
    .on-air-btn:disabled { opacity: 0.25; cursor: not-allowed; }

    .kamp-label {
      font-size: 18px;
      font-weight: 700;
      color: #555;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .icon-btn {
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      padding: 5px 7px;
      border-radius: 4px;
      font-size: 14px;
      line-height: 1;
      transition: all 0.15s;
    }
    .icon-btn:hover { color: #ccc; background: #252525; }

    .collapse-arrow { display: inline-block; transition: transform 0.2s; font-style: normal; }
    .kamp-block.collapsed .collapse-arrow { transform: rotate(180deg); }

    /* ── Block body ───────────────────────────────────────── */
    .kamp-body { padding: 4px 14px 16px 18px; }
    .kamp-block.collapsed .kamp-body { display: none; }

    /* ── Normal mode ──────────────────────────────────────── */
    .normal-view {
      display: grid;
      grid-template-columns: 200px 1fr 200px;
      align-items: center;
    }

    .kamp-info {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .info-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #bbb;
    }
    .info-icon { color: #555; font-size: 13px; min-width: 16px; text-align: center; }
    .info-link-text {
      font-size: 12px;
      color: #777;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 138px;
    }
    .copy-btn {
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      padding: 2px 5px;
      font-size: 14px;
      border-radius: 3px;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .copy-btn:hover { color: #ccc; }

    /* ── Score area ───────────────────────────────────────── */
    .score-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .team-block { text-align: center; }
    .team-name {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 2px;
      color: #fff;
      min-height: 38px;
      line-height: 1;
    }
    .score-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
      justify-content: center;
    }
    .score-btn {
      width: 30px;
      height: 30px;
      border-radius: 5px;
      border: 1px solid #333;
      background: #222;
      color: #fff;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      transition: background 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .score-btn:hover { background: #2e2e2e; }
    .score-val {
      font-size: 46px;
      font-weight: 800;
      color: var(--blue);
      min-width: 52px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }
    .vs-sep { font-size: 22px; color: #3a3a3a; font-weight: 700; padding: 0 14px; align-self: center; margin-top: 28px; letter-spacing: 2px; }

    /* ── Edit mode ────────────────────────────────────────── */
    .edit-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .span2 { grid-column: span 2; }

    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-label {
      font-size: 10px;
      color: #555;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-weight: 600;
    }
    .form-input, .form-select {
      background: var(--input-bg);
      border: 1px solid #2e2e2e;
      color: #fff;
      padding: 7px 10px;
      border-radius: 4px;
      font-size: 13px;
      width: 100%;
      transition: border-color 0.15s;
    }
    .form-input:focus, .form-select:focus { outline: none; border-color: var(--orange); }
    .form-select { cursor: pointer; }

    .vmix-row { display: flex; gap: 6px; align-items: center; }
    .vmix-row .form-input { flex: 1; }

    .edit-actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      align-items: center;
    }
    .btn {
      padding: 7px 18px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      transition: all 0.15s;
    }
    .btn-save   { background: var(--orange); color: #fff; }
    .btn-save:hover { filter: brightness(1.1); }
    .btn-cancel { background: #222; color: #888; border: 1px solid #333; }
    .btn-cancel:hover { color: #fff; }
    .btn-reset  { background: transparent; color: #666; border: 1px solid #2e2e2e; margin-left: auto; }
    .btn-reset:hover { color: var(--red); border-color: var(--red); }

    /* ── Toast ────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 22px;
      right: 22px;
      background: #1c1c1c;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 9px 18px;
      font-size: 13px;
      color: #ccc;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.2s;
      pointer-events: none;
      z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.ok  { border-color: var(--green); color: var(--green); }
    .toast.err { border-color: var(--red);   color: var(--red); }

    /* ── Loading ──────────────────────────────────────────── */
    .loading { padding: 40px; text-align: center; color: #444; font-size: 13px; letter-spacing: 1px; }
    .load-err { padding: 40px; text-align: center; color: var(--red); font-size: 13px; }

    /* ── Subs ─────────────────────────────────────────────── */
    .subs-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    .subs-section { margin-bottom: 28px; }
    .subs-section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      color: #444;
      text-transform: uppercase;
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid #222;
    }
    .sub-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 12px 10px 16px;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-left: 3px solid var(--blue);
      border-radius: 6px;
      margin-bottom: 10px;
      min-height: 77px;
    }
    .sub-row.vmix-call-row {
      border-left: 3px solid #a855f7;
      min-height: 95px;
      align-items: flex-start;
      padding-top: 12px;
      padding-bottom: 12px;
    }
    .sub-row.grayed {
      opacity: 0.35;
      pointer-events: none;
    }
    .sub-num {
      font-size: 11px;
      font-weight: 700;
      min-width: 22px;
      text-align: right;
      align-self: flex-start;
      padding-top: 2px;
      color: var(--blue);
    }
    .vmix-call-row .sub-num { color: #a855f7; }
    .sub-text {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
      overflow: hidden;
    }
    .sub-text.empty { color: #333; font-style: italic; }
    .sub-navn  { font-size: 15px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sub-titel { font-size: 14px; font-weight: 400; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sub-link-row { display: flex; align-items: center; gap: 4px; }
    .sub-link {
      font-size: 13px;
      color: #555;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }
    .sub-uses-kamp {
      font-size: 11px;
      color: #555;
      letter-spacing: 1px;
      font-weight: 700;
    }
    .sub-edit-fields {
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex: 1;
    }
    .sub-edit-fields .form-input { width: 100%; padding: 5px 8px; font-size: 13px; }
    .sub-edit-fields .form-input.navn-input  { font-weight: 700; }
    .sub-edit-fields .form-input.titel-input { color: #aaa; }
    .sub-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
    .btn-sm {
      padding: 4px 12px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      transition: all 0.15s;
    }
    .btn-sm.save   { background: var(--orange); color: #fff; }
    .btn-sm.save:hover { filter: brightness(1.1); }
    .btn-sm.cancel { background: #222; color: #666; border: 1px solid #333; }
    .btn-sm.cancel:hover { color: #fff; }
    .btn-sm.reset  { background: transparent; color: #555; border: 1px solid #2a2a2a; }
    .btn-sm.reset:hover { color: var(--red); border-color: var(--red); }

    /* ── Ticker ───────────────────────────────────────────── */
    .ticker-list { display: flex; flex-direction: column; gap: 20px; padding-bottom: 40px; }

    .ticker-block {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      overflow: hidden;
      position: relative;
      transition: border-color 0.2s;
    }
    .ticker-block.on-air-breaking { border-color: #eab308; }
    .ticker-block::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 6px;
      background: transparent;
      transition: background 0.2s;
      z-index: 1;
    }
    .ticker-block.on-air::before         { background: var(--red); }
    .ticker-block.on-air-breaking::before { background: var(--red); }

    .ticker-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px 10px 18px;
      cursor: pointer;
      user-select: none;
    }
    .ticker-header-left  { display: flex; align-items: center; gap: 10px; flex: 1; }
    .ticker-header-center { flex: 1; text-align: center; }
    .ticker-header-right { display: flex; align-items: center; gap: 4px; flex: 1; justify-content: flex-end; }

    .ticker-num {
      font-size: 18px;
      font-weight: 700;
      color: #555;
      letter-spacing: 2px;
    }

    .breaking-btn {
      padding: 3px 11px;
      border-radius: 20px;
      border: 1px solid #555;
      background: transparent;
      color: #666;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .breaking-btn.active { border-color: #eab308; background: #eab308; color: #000; }
    .breaking-btn:disabled { opacity: 0.25; cursor: not-allowed; }

    .ticker-body { padding: 4px 14px 14px 18px; }
    .ticker-block.collapsed .ticker-body { display: none; }

    .ticker-normal { display: flex; flex-direction: row; align-items: baseline; gap: 12px; }
    .ticker-overskrift { font-size: 15px; font-weight: 400; color: #fff; text-transform: uppercase; white-space: nowrap; }
    .ticker-tekst { font-size: 15px; color: #888; }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-title"><span>VMIX LIVE</span><span class="control">C O N T R O L</span></div>
  <img class="header-logo" src="logo.png" alt="DR">
  <div class="clock" id="clock">00.00.00</div>
</header>

<!-- TABS -->
<nav class="tabs">
  <button class="tab-btn active" data-tab="kampe">KAMPE</button>
  <button class="tab-btn" data-tab="subs">SUBS</button>
  <button class="tab-btn" data-tab="navneskilte">NAVNESKILTE</button>
  <button class="tab-btn" data-tab="ticker">TICKER</button>
  <button class="tab-btn" data-tab="credits">CREDITS</button>
</nav>

<!-- TAB: KAMPE -->
<div id="tab-kampe" class="tab-pane active">
  <div class="kamp-list" id="kampList">
    <div class="loading">Henter data…</div>
  </div>
</div>

<!-- TAB: SUBS -->
<div id="tab-subs" class="tab-pane">
  <div id="subsList"><div class="loading">Henter data…</div></div>
</div>

<!-- TAB: NAVNESKILTE -->
<div id="tab-navneskilte" class="tab-pane">
  <div class="coming-soon">KOMMER SNART</div>
</div>

<!-- TAB: TICKER -->
<div id="tab-ticker" class="tab-pane">
  <div id="tickerList"><div class="loading">Henter data…</div></div>
</div>

<!-- TAB: CREDITS -->
<div id="tab-credits" class="tab-pane">
  <div class="coming-soon">KOMMER SNART</div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxRufEbQXaXP4JtAgEnUep-yW5RzCh_qsStXUTEO_402rthriL6yL6XFsRS_Qw_f5TN6A/exec';

// ── STATE ─────────────────────────────────────────────────────
let dropdowns = { holds: [], kommentatorer: [], lokationer: [] };

const makeKamp = () => ({
  hold1Lang: '', hold1Kort: '', hold1Score: 0,
  hold2Score: 0, hold2Kort: '', hold2Lang: '',
  kommentator: '', lokation: '', vmixcall: '', onAir: false,
  // edit buffer
  editMode: false, collapsed: false,
  buf: { hold1Lang: '', hold2Lang: '', kommentator: '', lokation: '', vmixcall: '' }
});

let kampe = Array.from({ length: 6 }, makeKamp);

// ── TICKER STATE ──────────────────────────────────────────────
const makeTicker = () => ({
  overskrift: '', tekst: '', onAir: false, breaking: false,
  editMode: false, collapsed: false,
  buf: { overskrift: '', tekst: '' }
});
let tickers = Array.from({ length: 20 }, makeTicker);

// ── SUBS STATE ────────────────────────────────────────────────
const makeSub      = () => ({ navn: '', titel: '', editMode: false, buf: { navn: '', titel: '' } });
const makeVmixCall = () => ({ navn: '', titel: '', link: '', editMode: false, buf: { navn: '', titel: '', link: '' } });
let subs      = Array.from({ length: 15 }, makeSub);
let vmixCalls = Array.from({ length: 8  }, makeVmixCall);

// ── CLOCK ─────────────────────────────────────────────────────
function tickClock() {
  const d   = new Date();
  const pad = n => String(n).padStart(2, '0');
  document.getElementById('clock').textContent =
    `${pad(d.getHours())}.${pad(d.getMinutes())}.${pad(d.getSeconds())}`;
}
setInterval(tickClock, 1000);
tickClock();

// ── TABS ──────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

// ── API ───────────────────────────────────────────────────────
async function api(params) {
  const url = SCRIPT_URL + '?' + new URLSearchParams(params).toString();
  const res  = await fetch(url);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

// ── TOAST ─────────────────────────────────────────────────────
let toastTimer;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ── CLIPBOARD ─────────────────────────────────────────────────
async function copyText(text) {
  if (!text) return;
  try {
    await navigator.clipboard.writeText(text);
    toast('Kopieret!', 'ok');
  } catch {
    toast('Kopiering fejlede', 'err');
  }
}

// ── TITLE CASE ────────────────────────────────────────────────
function toTitleCase(str) {
  return str.replace(/\b\w/g, c => c.toUpperCase());
}
function titleCaseInput(el, buf, key) {
  el.addEventListener('blur', () => {
    const val = toTitleCase(el.value);
    el.value  = val;
    buf[key]  = val;
  });
}

// ── HTML ESCAPE ───────────────────────────────────────────────
function esc(str) {
  return String(str || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ── RENDER ────────────────────────────────────────────────────
function renderAll() {
  const list = document.getElementById('kampList');
  list.innerHTML = '';
  kampe.forEach((_, i) => list.appendChild(buildBlock(i)));
}

function rerender(i) {
  const old = document.getElementById('kamp-' + i);
  if (old) old.replaceWith(buildBlock(i));
}

function buildBlock(i) {
  const k = kampe[i];
  const block = document.createElement('div');
  block.id        = 'kamp-' + i;
  block.className = 'kamp-block'
    + (k.onAir     ? ' on-air'    : '')
    + (k.collapsed ? ' collapsed' : '');

  // Header
  block.innerHTML = `
    <div class="kamp-header" id="kamp-hdr-${i}">
      <div class="kamp-header-left">
        <button class="on-air-btn ${k.onAir ? 'active' : ''}"
                id="oabtn-${i}" ${!kampKlarTilOnAir(i) ? 'disabled' : ''}>ON AIR</button>
      </div>
      <div class="kamp-header-center">
        <span class="kamp-label">KAMP ${i + 1}</span>
      </div>
      <div class="kamp-header-right">
        ${!k.editMode
          ? `<button class="icon-btn" id="editbtn-${i}" title="Rediger">✏️</button>`
          : ''}
        <button class="icon-btn" id="collbtn-${i}" title="Fold ind/ud">
          <i class="collapse-arrow">▴</i>
        </button>
      </div>
    </div>
    <div class="kamp-body" id="kamp-body-${i}"></div>
  `;

  // Body content
  const body = block.querySelector('#kamp-body-' + i);
  body.appendChild(k.editMode ? buildEditView(i) : buildNormalView(i));

  // Events — ON AIR
  block.querySelector('#oabtn-' + i).addEventListener('click', e => {
    e.stopPropagation();
    toggleOnAir(i);
  });

  // Events — collapse (click header, but not buttons)
  block.querySelector('#kamp-hdr-' + i).addEventListener('click', e => {
    if (!e.target.closest('button')) toggleCollapse(i);
  });
  block.querySelector('#collbtn-' + i).addEventListener('click', e => {
    e.stopPropagation();
    toggleCollapse(i);
  });

  // Events — edit button (normal mode only)
  const eb = block.querySelector('#editbtn-' + i);
  if (eb) eb.addEventListener('click', e => { e.stopPropagation(); enterEdit(i); });

  return block;
}

// ── ACTIONS ───────────────────────────────────────────────────

function kampKlarTilOnAir(i) {
  const k = kampe[i];
  return k.hold1Lang && k.hold2Lang && k.kommentator;
}

function tickerKlarTilOnAir(i) {
  const t = tickers[i];
  return t.overskrift && t.tekst;
}

function toggleCollapse(i) {
  kampe[i].collapsed = !kampe[i].collapsed;
  rerender(i);
}

function toggleOnAir(i) {
  if (!kampe[i].onAir && !kampKlarTilOnAir(i)) return;
  kampe[i].onAir = !kampe[i].onAir;
  rerender(i);
  api({ action: 'setOnAir', kampIndex: i, onAir: kampe[i].onAir })
    .catch(() => toast('Fejl ved ON AIR opdatering', 'err'));
}

function enterEdit(i) {
  const k = kampe[i];
  k.buf = {
    hold1Lang:   k.hold1Lang,
    hold2Lang:   k.hold2Lang,
    kommentator: k.kommentator,
    lokation:    k.lokation,
    vmixcall:    k.vmixcall
  };
  k.editMode = true;
  rerender(i);
}

function cancelEdit(i) {
  kampe[i].editMode = false;
  rerender(i);
}

function resetEdit(i, div) {
  // Clear dropdowns and score — keep vmixcall
  const k = kampe[i];
  k.buf.hold1Lang   = '';
  k.buf.hold2Lang   = '';
  k.buf.kommentator = '';
  k.buf.lokation    = '';
  k.hold1Score      = 0;
  k.hold2Score      = 0;

  div.querySelector('#eh1-' + i).value = '';
  div.querySelector('#eh2-' + i).value = '';
  div.querySelector('#ek-'  + i).value = '';
  div.querySelector('#el-'  + i).value = '';
}

async function saveKamp(i, div) {
  const k   = kampe[i];
  const buf = k.buf;

  // Resolve short names
  const h1 = dropdowns.holds.find(h => h.lang === buf.hold1Lang);
  const h2 = dropdowns.holds.find(h => h.lang === buf.hold2Lang);

  k.hold1Lang   = buf.hold1Lang;
  k.hold1Kort   = h1 ? h1.kort : buf.hold1Lang;
  k.hold2Lang   = buf.hold2Lang;
  k.hold2Kort   = h2 ? h2.kort : buf.hold2Lang;
  k.kommentator = buf.kommentator;
  k.lokation    = buf.lokation;
  k.vmixcall    = buf.vmixcall;
  k.editMode    = false;

  rerender(i);

  try {
    await api({
      action:      'saveKamp',
      kampIndex:   i,
      hold1Lang:   k.hold1Lang,
      hold1Kort:   k.hold1Kort,
      hold1Score:  k.hold1Score,
      hold2Score:  k.hold2Score,
      hold2Kort:   k.hold2Kort,
      hold2Lang:   k.hold2Lang,
      kommentator: k.kommentator,
      lokation:    k.lokation,
      vmixcall:    k.vmixcall,
      onAir:       k.onAir
    });
    toast('Gemt ✓', 'ok');
  } catch {
    toast('Fejl ved gem — prøv igen', 'err');
  }
}

async function changeScore(i, team, delta) {
  const k = kampe[i];
  if (team === 1) {
    k.hold1Score = Math.max(0, k.hold1Score + delta);
    const el = document.getElementById('sv1-' + i);
    if (el) el.textContent = k.hold1Score;
  } else {
    k.hold2Score = Math.max(0, k.hold2Score + delta);
    const el = document.getElementById('sv2-' + i);
    if (el) el.textContent = k.hold2Score;
  }
  try {
    await api({ action: 'updateScore', kampIndex: i, team, delta });
  } catch {
    toast('Fejl ved scoreopdatering', 'err');
  }
}

// ── TICKER RENDER ─────────────────────────────────────────────
function renderTickers() {
  const list = document.getElementById('tickerList');
  if (!list) return;
  list.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'ticker-list';
  tickers.forEach((_, i) => wrap.appendChild(buildTickerBlock(i)));
  list.appendChild(wrap);
}

function rerenderTicker(i) {
  const old = document.getElementById('ticker-' + i);
  if (old) old.replaceWith(buildTickerBlock(i));
}

function buildTickerBlock(i) {
  const t = tickers[i];
  const block = document.createElement('div');
  block.id = 'ticker-' + i;
  block.className = 'ticker-block'
    + (t.onAir && t.breaking ? ' on-air-breaking' : '')
    + (t.onAir && !t.breaking ? ' on-air' : '')
    + (t.collapsed ? ' collapsed' : '');

  block.innerHTML = `
    <div class="ticker-header" id="ticker-hdr-${i}">
      <div class="ticker-header-left">
        <button class="on-air-btn ${t.onAir ? 'active' : ''}" id="toa-${i}" ${!tickerKlarTilOnAir(i) ? 'disabled' : ''}>ON AIR</button>
        <button class="breaking-btn ${t.breaking ? 'active' : ''}" id="tbr-${i}" ${!tickerKlarTilOnAir(i) ? 'disabled' : ''}>BREAKING</button>
      </div>
      <div class="ticker-header-center">
        <span class="ticker-num">TICKER ${i + 1}</span>
      </div>
      <div class="ticker-header-right">
        ${!t.editMode ? `<button class="icon-btn" id="teb-${i}" title="Rediger">✏️</button>` : ''}
        <button class="icon-btn" id="tcol-${i}" title="Fold ind/ud">
          <i class="collapse-arrow">▴</i>
        </button>
      </div>
    </div>
    <div class="ticker-body" id="ticker-body-${i}"></div>
  `;

  const body = block.querySelector('#ticker-body-' + i);
  body.appendChild(t.editMode ? buildTickerEdit(i) : buildTickerNormal(i));

  block.querySelector('#toa-' + i).addEventListener('click', e => { e.stopPropagation(); toggleTickerOnAir(i); });
  block.querySelector('#tbr-' + i).addEventListener('click', e => { e.stopPropagation(); toggleTickerBreaking(i); });

  block.querySelector('#ticker-hdr-' + i).addEventListener('click', e => {
    if (!e.target.closest('button')) toggleTickerCollapse(i);
  });
  block.querySelector('#tcol-' + i).addEventListener('click', e => { e.stopPropagation(); toggleTickerCollapse(i); });

  const eb = block.querySelector('#teb-' + i);
  if (eb) eb.addEventListener('click', e => { e.stopPropagation(); enterTickerEdit(i); });

  return block;
}

function buildTickerNormal(i) {
  const t = tickers[i];
  const div = document.createElement('div');
  div.className = 'ticker-normal';
  div.innerHTML = `
    <div class="ticker-overskrift">${esc(t.overskrift) || '<span style="color:#333">—</span>'}</div>
    <div class="ticker-tekst">${esc(t.tekst) || ''}</div>
  `;
  return div;
}

function buildTickerEdit(i) {
  const t = tickers[i];
  const div = document.createElement('div');
  div.innerHTML = `
    <div class="edit-grid" style="margin-bottom:10px;">
      <div class="form-group span2">
        <label class="form-label">Overskrift</label>
        <input class="form-input" id="tov-${i}" value="${esc(t.buf.overskrift)}" placeholder="Overskrift">
      </div>
      <div class="form-group span2">
        <label class="form-label">Tekst</label>
        <input class="form-input" id="ttx-${i}" value="${esc(t.buf.tekst)}" placeholder="Ticker tekst">
      </div>
    </div>
    <div class="edit-actions">
      <button class="btn btn-save"   id="tgem-${i}">💾 GEM</button>
      <button class="btn btn-cancel" id="tann-${i}">ANNULLER</button>
      <button class="btn btn-reset"  id="tnul-${i}">RYD</button>
    </div>
  `;

  div.querySelector('#tov-' + i).addEventListener('input', e => { t.buf.overskrift = e.target.value; });
  div.querySelector('#ttx-' + i).addEventListener('input', e => { t.buf.tekst      = e.target.value; });
  div.querySelector('#tov-' + i).addEventListener('blur',  e => {
    const val = e.target.value.toUpperCase();
    e.target.value   = val;
    t.buf.overskrift = val;
  });

  div.querySelector('#tgem-' + i).addEventListener('click', () => saveTickerRow(i));
  div.querySelector('#tann-' + i).addEventListener('click', () => { t.editMode = false; rerenderTicker(i); });
  div.querySelector('#tnul-' + i).addEventListener('click', () => {
    t.buf.overskrift = ''; t.buf.tekst = '';
    div.querySelector('#tov-' + i).value = '';
    div.querySelector('#ttx-' + i).value = '';
  });

  return div;
}

function toggleTickerCollapse(i) { tickers[i].collapsed = !tickers[i].collapsed; rerenderTicker(i); }

function toggleTickerOnAir(i) {
  if (!tickers[i].onAir && !tickerKlarTilOnAir(i)) return;
  tickers[i].onAir = !tickers[i].onAir;
  rerenderTicker(i);
  api({ action: 'setTickerOnAir', tickerIndex: i, onAir: tickers[i].onAir })
    .catch(() => toast('Fejl ved ON AIR', 'err'));
}

function toggleTickerBreaking(i) {
  if (!tickers[i].breaking && !tickerKlarTilOnAir(i)) return;
  tickers[i].breaking = !tickers[i].breaking;
  rerenderTicker(i);
  api({ action: 'setTickerBreaking', tickerIndex: i, breaking: tickers[i].breaking })
    .catch(() => toast('Fejl ved BREAKING', 'err'));
}

function enterTickerEdit(i) {
  const t = tickers[i];
  t.buf = { overskrift: t.overskrift, tekst: t.tekst };
  t.editMode = true;
  rerenderTicker(i);
}

async function saveTickerRow(i) {
  const t = tickers[i];
  t.overskrift = t.buf.overskrift.toUpperCase();
  t.tekst      = t.buf.tekst;
  t.editMode   = false;
  rerenderTicker(i);
  try {
    await api({ action: 'saveTicker', tickerIndex: i, overskrift: t.overskrift, tekst: t.tekst });
    toast('Gemt ✓', 'ok');
  } catch { toast('Fejl ved gem', 'err'); }
}

// ── SUBS RENDER ───────────────────────────────────────────────
function renderSubs() {
  const container = document.getElementById('subsList');
  if (!container) return;
  container.innerHTML = '';

  const grid = document.createElement('div');
  grid.className = 'subs-grid';

  // Sektion: SUBS (venstre)
  const sec1 = document.createElement('div');
  sec1.className = 'subs-section';
  sec1.innerHTML = '<div class="subs-section-title" style="color:var(--blue)">Subs</div>';
  subs.forEach((_, i) => sec1.appendChild(buildSubRow(i)));
  grid.appendChild(sec1);

  // Sektion: VMIX CALLS (højre)
  const sec2 = document.createElement('div');
  sec2.className = 'subs-section';
  sec2.innerHTML = '<div class="subs-section-title" style="color:#a855f7">vMix Calls</div>';
  vmixCalls.forEach((_, i) => sec2.appendChild(buildVmixCallRow(i)));
  grid.appendChild(sec2);

  container.appendChild(grid);
}

function rerenderSub(i) {
  const old = document.getElementById('sub-' + i);
  if (old) old.replaceWith(buildSubRow(i));
}

function rerenderVmixCall(i) {
  const old = document.getElementById('vcall-' + i);
  if (old) old.replaceWith(buildVmixCallRow(i));
}

function buildSubRow(i) {
  const s   = subs[i];
  const row = document.createElement('div');
  row.id        = 'sub-' + i;
  row.className = 'sub-row';

  if (s.editMode) {
    row.innerHTML = `
      <span class="sub-num">${i + 1}</span>
      <div class="sub-edit-fields">
        <input class="form-input navn-input"  id="sn-${i}" value="${esc(s.buf.navn)}"  placeholder="Navn">
        <input class="form-input titel-input" id="st-${i}" value="${esc(s.buf.titel)}" placeholder="Titel">
      </div>
      <div class="sub-actions">
        <button class="btn-sm save"   id="sg-${i}">GEM</button>
        <button class="btn-sm cancel" id="sa-${i}">ANNULLER</button>
        <button class="btn-sm reset"  id="sr-${i}">RYD</button>
      </div>`;
    row.querySelector('#sn-' + i).addEventListener('input',  e => { s.buf.navn  = e.target.value; });
    row.querySelector('#st-' + i).addEventListener('input',  e => { s.buf.titel = e.target.value; });
    titleCaseInput(row.querySelector('#sn-' + i), s.buf, 'navn');
    titleCaseInput(row.querySelector('#st-' + i), s.buf, 'titel');
    row.querySelector('#sg-' + i).addEventListener('click',  () => saveSubRow(i));
    row.querySelector('#sa-' + i).addEventListener('click',  () => { s.editMode = false; rerenderSub(i); });
    row.querySelector('#sr-' + i).addEventListener('click',  () => {
      s.buf.navn = ''; s.buf.titel = '';
      row.querySelector('#sn-' + i).value = '';
      row.querySelector('#st-' + i).value = '';
    });
  } else {
    const hasData = s.navn || s.titel;
    row.innerHTML = `
      <span class="sub-num">${i + 1}</span>
      <span class="sub-text ${hasData ? '' : 'empty'}">${hasData
        ? `<span class="sub-navn">${esc(s.navn)}</span><span class="sub-titel">${esc(s.titel)}</span>`
        : '—'}</span>
      <button class="icon-btn" id="seb-${i}" title="Rediger">✏️</button>`;
    row.querySelector('#seb-' + i).addEventListener('click', () => {
      s.buf = { navn: s.navn, titel: s.titel };
      s.editMode = true;
      rerenderSub(i);
    });
  }
  return row;

  const row  = document.createElement('div');

    row.innerHTML = `
      <span class="sub-num">${i + 1}</span>

        <div style="display:flex;gap:6px;align-items:center;">
          <input class="form-input" id="vcl-${i}" value="${esc(c.buf.link)}" placeholder="vMix Call Link" style="flex:1;">

        </div>
      </div>
      <div class="sub-actions">
        <button class="btn-sm save"   id="vcg-${i}">GEM</button>

      </div>`;
    row.querySelector('#vcn-'  + i).addEventListener('input', e => { c.buf.navn  = e.target.value; });
    row.querySelector('#vct-'  + i).addEventListener('input', e => { c.buf.titel = e.target.value; });
    titleCaseInput(row.querySelector('#vcn-' + i), c.buf, 'navn');
    titleCaseInput(row.querySelector('#vct-' + i), c.buf, 'titel');
    row.querySelector('#vcl-'  + i).addEventListener('input', e => { c.buf.link  = e.target.value; });
    row.querySelector('#vccp-' + i).addEventListener('click', () => copyText(row.querySelector('#vcl-' + i).value));
    row.querySelector('#vcg-'  + i).addEventListener('click', () => saveVmixCallRow(i));
    row.querySelector('#vca-'  + i).addEventListener('click', () => { c.editMode = false; rerenderVmixCall(i); });
    row.querySelector('#vcr-'  + i).addEventListener('click', () => {
      c.buf.navn = ''; c.buf.titel = ''; c.buf.link = '';
      row.querySelector('#vcn-' + i).value = '';
      row.querySelector('#vct-' + i).value = '';
      row.querySelector('#vcl-' + i).value = '';
    });
  } else {
    const hasData = c.navn || c.titel;
    row.innerHTML = `
      <span class="sub-num">${i + 1}</span>
      ${kampBruger
        ? `<span class="sub-uses-kamp">BRUGES AF KAMP ${i + 1}</span>`
        : `<span class="sub-text ${hasData ? '' : 'empty'}">${hasData
            ? `<span class="sub-navn">${esc(c.navn)}</span><span class="sub-titel">${esc(c.titel)}</span><span class="sub-link-row"><span class="sub-link" title="${esc(c.link)}">${esc(c.link) || ''}</span><button class="copy-btn icon-btn" id="vccp2-${i}" title="Kopiér link">⎘</button></span>`
            : '—'}</span>`}
      ${!kampBruger ? `<button class="icon-btn" id="vceb-${i}" title="Rediger">✏️</button>` : ''}`;
    if (!kampBruger) {
      const cpBtn = row.querySelector('#vccp2-' + i);
      if (cpBtn) cpBtn.addEventListener('click', () => copyText(c.link));
      const ebBtn = row.querySelector('#vceb-' + i);
      if (ebBtn) ebBtn.addEventListener('click', () => {
        c.buf = { navn: c.navn, titel: c.titel, link: c.link };
        c.editMode = true;
        rerenderVmixCall(i);
      });
    }
  }
  return row;
}

async function saveSubRow(i) {
  const s = subs[i];
  s.navn  = s.buf.navn;
  s.titel = s.buf.titel;
  s.editMode = false;
  rerenderSub(i);
  try {
    await api({ action: 'saveSub', subIndex: i, navn: s.navn, titel: s.titel });
    toast('Gemt ✓', 'ok');
  } catch { toast('Fejl ved gem', 'err'); }
}

async function saveVmixCallRow(i) {
  const c = vmixCalls[i];
  c.navn  = c.buf.navn;
  c.titel = c.buf.titel;
  c.link  = c.buf.link;
  c.editMode = false;
  rerenderVmixCall(i);
  try {
    await api({ action: 'saveVmixCall', callIndex: i, navn: c.navn, titel: c.titel, link: c.link });
    toast('Gemt ✓', 'ok');
  } catch { toast('Fejl ved gem', 'err'); }
}

// ── INIT ──────────────────────────────────────────────────────
async function init() {
  try {
    const all = await api({ action: 'getAll' });
    if (all.error) throw new Error(all.error);

    dropdowns = all.dropdowns;

    all.kampe.forEach((data, i) => { kampe[i] = { ...kampe[i], ...data }; });

    if (all.subs) {
      all.subs.subs.forEach((data, i)      => { subs[i]      = { ...subs[i],      ...data }; });
      all.subs.vmixCalls.forEach((data, i) => { vmixCalls[i] = { ...vmixCalls[i], ...data }; });
    }

    if (all.tickers) {
      all.tickers.forEach((data, i) => { tickers[i] = { ...tickers[i], ...data }; });
    }

    renderAll();
    renderSubs();
    renderTickers();
  } catch (err) {
    document.getElementById('kampList').innerHTML =
      `<div class="load-err">Fejl ved indlæsning.<br>Tjek at Apps Script URL er indsat korrekt.<br><small style="color:#555">${err.message}</small></div>`;
  }
}

init();

// ── AUTO-SYNC hvert 15 sek ────────────────────────────────────
setInterval(async () => {
  try {
    const all = await api({ action: 'getAll' });
    if (all.error) return;

    all.kampe.forEach((data, i) => {
      if (kampe[i].editMode) return;
      const prev = kampe[i];
      kampe[i] = { ...prev, ...data, editMode: false, collapsed: prev.collapsed, buf: prev.buf };
      rerender(i);
    });

    if (all.subs) {
      all.subs.subs.forEach((data, i) => {
        if (subs[i].editMode) return;
        subs[i] = { ...subs[i], ...data };
        rerenderSub(i);
      });
      all.subs.vmixCalls.forEach((data, i) => {
        if (vmixCalls[i].editMode) return;
        vmixCalls[i] = { ...vmixCalls[i], ...data };
        rerenderVmixCall(i);
      });
    }

    if (all.tickers) {
      all.tickers.forEach((data, i) => {
        if (tickers[i].editMode) return;
        tickers[i] = { ...tickers[i], ...data };
        rerenderTicker(i);
      });
    }
  } catch { /* stille fejl */ }
}, 15000);
</script>
